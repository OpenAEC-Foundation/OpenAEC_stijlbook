<svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid slice">
  <rect width="400" height="140" fill="#36363E"/>

  <!-- Blueprint grid -->
  <defs>
    <pattern id="ltrGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#FAFAF9" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="400" height="140" fill="url(#ltrGrid)" opacity="0.30"/>

  <!-- Abstract building outlines -->
  <g transform="translate(80,30)" opacity="0.18">
    <rect x="0" y="20" width="25" height="60" fill="none" stroke="#D97706" stroke-width="1"/>
    <rect x="30" y="0" width="20" height="80" fill="none" stroke="#F59E0B" stroke-width="1"/>
    <rect x="55" y="35" width="30" height="45" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <rect x="90" y="10" width="18" height="70" fill="none" stroke="#F59E0B" stroke-width="0.8"/>
    <!-- small windows -->
    <rect x="4" y="28" width="5" height="4" fill="none" stroke="#D97706" stroke-width="0.5"/>
    <rect x="12" y="28" width="5" height="4" fill="none" stroke="#D97706" stroke-width="0.5"/>
    <rect x="4" y="38" width="5" height="4" fill="none" stroke="#D97706" stroke-width="0.5"/>
    <rect x="12" y="38" width="5" height="4" fill="none" stroke="#D97706" stroke-width="0.5"/>
    <rect x="34" y="10" width="4" height="4" fill="none" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="42" y="10" width="4" height="4" fill="none" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="34" y="20" width="4" height="4" fill="none" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="42" y="20" width="4" height="4" fill="none" stroke="#F59E0B" stroke-width="0.5"/>
  </g>

  <!-- Code bracket accent -->
  <g transform="translate(230,25)" font-family="'JetBrains Mono', monospace" font-size="36" fill="#D97706" opacity="0.12">
    <text x="0" y="0">{</text>
    <text x="55" y="0">}</text>
  </g>

  <!-- Abstract connection nodes -->
  <g opacity="0.15">
    <circle cx="310" cy="40" r="2" fill="#D97706"/>
    <circle cx="340" cy="60" r="2" fill="#F59E0B"/>
    <circle cx="360" cy="35" r="2" fill="#D97706"/>
    <line x1="312" y1="41" x2="338" y2="59" stroke="#D97706" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="342" y1="59" x2="358" y2="37" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>
</svg>
