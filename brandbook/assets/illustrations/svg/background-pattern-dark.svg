<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!--
    OpenAEC Dark Background Pattern
    Usage: background-image: url('background-pattern-dark.svg');
           background-size: 600px 600px; (or cover for full-bleed)
           background-color: #2A2A32;
  -->
  <rect width="600" height="600" fill="#2A2A32"/>

  <!-- Blueprint grid -->
  <defs>
    <pattern id="bgGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FAFAF9" stroke-width="0.4" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bgGrid)"/>

  <!-- Isometric building cluster — top-left -->
  <g transform="translate(80,120)" opacity="0.12">
    <polygon points="0,-50 35,-30 35,15 0,35 -35,15 -35,-30" fill="none" stroke="#D97706" stroke-width="2"/>
    <line x1="0" y1="-50" x2="0" y2="0" stroke="#D97706" stroke-width="1.2"/>
    <line x1="35" y1="-30" x2="0" y2="0" stroke="#D97706" stroke-width="1.2"/>
    <line x1="-35" y1="-30" x2="0" y2="0" stroke="#D97706" stroke-width="1.2"/>
    <polygon points="0,-50 35,-30 0,0 -35,-30" fill="#D97706" opacity="0.15"/>
    <rect x="-22" y="-22" width="6" height="5" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="0.6"/>
    <rect x="-12" y="-22" width="6" height="5" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="0.6"/>
    <rect x="-22" y="-12" width="6" height="5" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="0.6"/>
    <rect x="-12" y="-12" width="6" height="5" fill="#D97706" fill-opacity="0.2" stroke="#D97706" stroke-width="0.6"/>
  </g>

  <!-- Small block — near top-left -->
  <g transform="translate(145,150)" opacity="0.10">
    <polygon points="0,-22 22,-10 22,10 0,22 -22,10 -22,-10" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <polygon points="0,-22 22,-10 0,0 -22,-10" fill="#F59E0B" opacity="0.1"/>
  </g>

  <!-- Code brackets — center area -->
  <g transform="translate(260,200)" font-family="'JetBrains Mono', monospace" font-size="48" fill="#D97706" opacity="0.08">
    <text x="0" y="0">{</text>
    <text x="80" y="0">}</text>
  </g>

  <!-- Code lines -->
  <g transform="translate(290,178)" stroke="#FAFAF9" stroke-width="1.5" opacity="0.06">
    <line x1="0" y1="0" x2="35" y2="0"/>
    <line x1="5" y1="9" x2="28" y2="9"/>
    <line x1="5" y1="18" x2="38" y2="18"/>
    <line x1="0" y1="27" x2="32" y2="27"/>
  </g>

  <!-- BIM cube — center-right -->
  <g transform="translate(420,130)" opacity="0.10">
    <rect x="12" y="-12" width="45" height="45" fill="none" stroke="#FAFAF9" stroke-width="1" opacity="0.4"/>
    <rect x="0" y="0" width="45" height="45" fill="none" stroke="#D97706" stroke-width="1.8"/>
    <line x1="0" y1="0" x2="12" y2="-12" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="0" x2="57" y2="-12" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="45" x2="57" y2="33" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="45" x2="12" y2="33" stroke="#FAFAF9" stroke-width="1" opacity="0.5"/>
    <polygon points="0,0 12,-12 57,-12 45,0" fill="#D97706" opacity="0.12"/>
    <text x="7" y="29" font-family="'JetBrains Mono', monospace" font-size="12" fill="#D97706" font-weight="bold">BIM</text>
  </g>

  <!-- I-profile — bottom-left -->
  <g transform="translate(130,380)" opacity="0.10">
    <path d="M-18,0 L18,0 L18,4 L7,4 L7,32 L18,32 L18,36 L-18,36 L-18,32 L-7,32 L-7,4 L-18,4 Z" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  </g>

  <!-- Truss — bottom area -->
  <g transform="translate(300,420)" opacity="0.08">
    <polygon points="0,-35 45,0 -45,0" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="0" y1="-35" x2="0" y2="0" stroke="#F59E0B" stroke-width="1"/>
    <line x1="-22" y1="-17" x2="22" y2="-17" stroke="#F59E0B" stroke-width="0.8"/>
  </g>

  <!-- Isometric block — bottom-right -->
  <g transform="translate(480,350)" opacity="0.10">
    <polygon points="0,-35 28,-18 28,12 0,30 -28,12 -28,-18" fill="none" stroke="#D97706" stroke-width="1.8"/>
    <line x1="0" y1="-35" x2="0" y2="0" stroke="#D97706" stroke-width="1"/>
    <line x1="28" y1="-18" x2="0" y2="0" stroke="#D97706" stroke-width="1"/>
    <polygon points="0,-35 28,-18 0,0 -28,-18" fill="#D97706" opacity="0.12"/>
  </g>

  <!-- Small block — right side -->
  <g transform="translate(520,420)" opacity="0.08">
    <polygon points="0,-18 18,-8 18,8 0,18 -18,8 -18,-8" fill="none" stroke="#F59E0B" stroke-width="1.2"/>
    <polygon points="0,-18 18,-8 0,0 -18,-8" fill="#F59E0B" opacity="0.08"/>
  </g>

  <!-- Tall building — right-center -->
  <g transform="translate(530,230)" opacity="0.08">
    <polygon points="0,-60 30,-42 30,10 0,28 -30,10 -30,-42" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#F59E0B" stroke-width="1"/>
    <polygon points="0,-60 30,-42 0,0 -30,-42" fill="#F59E0B" opacity="0.1"/>
    <rect x="-18" y="-32" width="5" height="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="-9" y="-32" width="5" height="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="-18" y="-22" width="5" height="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="0.5"/>
    <rect x="-9" y="-22" width="5" height="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="0.5"/>
  </g>

  <!-- Building outlines — top-right (abstract) -->
  <g transform="translate(440,40)" opacity="0.06">
    <rect x="0" y="10" width="18" height="50" fill="none" stroke="#D97706" stroke-width="0.8"/>
    <rect x="22" y="0" width="14" height="60" fill="none" stroke="#F59E0B" stroke-width="0.8"/>
    <rect x="40" y="25" width="22" height="35" fill="none" stroke="#D97706" stroke-width="0.6"/>
  </g>

  <!-- Network connection nodes + dashed lines -->
  <g opacity="0.15">
    <circle cx="80" cy="120" r="3.5" fill="#D97706"/>
    <circle cx="145" cy="150" r="3" fill="#F59E0B"/>
    <circle cx="300" cy="200" r="3" fill="#D97706"/>
    <circle cx="442" cy="152" r="3" fill="#D97706"/>
    <circle cx="130" cy="380" r="2.5" fill="#F59E0B"/>
    <circle cx="300" cy="420" r="2.5" fill="#F59E0B"/>
    <circle cx="480" cy="350" r="3" fill="#D97706"/>
    <circle cx="530" cy="230" r="2.5" fill="#F59E0B"/>

    <line x1="85" y1="122" x2="140" y2="148" stroke="#D97706" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="150" y1="152" x2="295" y2="198" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="305" y1="200" x2="437" y2="154" stroke="#D97706" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="135" y1="378" x2="295" y2="422" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="305" y1="418" x2="475" y2="352" stroke="#D97706" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="485" y1="348" x2="525" y2="235" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="445" y1="150" x2="525" y2="232" stroke="#D97706" stroke-width="0.8" stroke-dasharray="4,3"/>
  </g>

  <!-- Subtle skyline silhouette at very bottom -->
  <g transform="translate(0,530)" opacity="0.05">
    <path d="M0,70 L0,50 L15,50 L15,35 L25,35 L25,45 L40,45 L40,20 L48,15 L55,20 L55,45 L70,45 L70,25 L80,20 L90,25 L90,45 L110,45 L110,30 L125,30 L125,45 L145,45 L145,15 L150,15 L150,10 L155,10 L155,15 L165,15 L165,45 L185,45 L185,40 L200,40 L200,50 L220,50 L220,35 L235,35 L235,45 L260,45 L260,25 L268,20 L275,25 L275,45 L300,45 L300,50 L325,50 L325,40 L340,40 L340,50 L365,50 L365,30 L375,25 L385,30 L385,45 L410,45 L410,35 L430,35 L430,50 L460,50 L460,40 L480,40 L480,50 L510,50 L510,45 L540,45 L540,55 L600,55 L600,70 Z" fill="#FAFAF9"/>
  </g>
</svg>
