<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <title>OpenAEC Foundation — Symbol (amber on dark)</title>
  <rect width="200" height="230" rx="16" fill="#36363E"/>

  <!--
    OPEN BUILDING BLOCK
    Isometric cube with right face partially open (door/gate).
    Represents: open-source + architecture + accessibility.

    Coordinate system centered at (100, 115).
    Iso angles: 30 degrees. Edge length ~70px.
  -->
  <g transform="translate(100,112)">

    <!-- === LEFT FACE (full, darker) === -->
    <polygon
      points="-65,-23 0,15 0,82 -65,45"
      fill="#D97706" fill-opacity="0.30"
      stroke="#D97706" stroke-width="2.8"
      stroke-linejoin="round"/>

    <!-- === TOP FACE (full, lightest) === -->
    <polygon
      points="0,-58 65,-23 0,15 -65,-23"
      fill="#D97706" fill-opacity="0.18"
      stroke="#D97706" stroke-width="2.8"
      stroke-linejoin="round"/>

    <!-- === RIGHT FACE — OPEN === -->
    <!-- Right edge (full height) -->
    <line x1="65" y1="-23" x2="65" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Bottom edge -->
    <line x1="0" y1="82" x2="65" y2="45" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Bottom of left face -->
    <line x1="-65" y1="45" x2="0" y2="82" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Wall portion above opening -->
    <polygon
      points="65,-23 0,15 0,35 65,0"
      fill="#D97706" fill-opacity="0.12"
      stroke="none"/>
    <line x1="0" y1="15" x2="0" y2="35" stroke="#D97706" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="65" y1="-23" x2="65" y2="0" stroke="#D97706" stroke-width="0" stroke-linecap="round"/>

    <!-- THE OPENING (door/gate) — warm gold accent -->
    <!-- Lintel (top of opening) -->
    <line x1="0" y1="35" x2="65" y2="0" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Threshold (bottom = already drawn as bottom edge of right face) -->

    <!-- Interior depth line visible through opening -->
    <line x1="0" y1="35" x2="-30" y2="52" stroke="#F59E0B" stroke-width="1.2" opacity="0.35"/>
    <line x1="65" y1="0" x2="35" y2="17" stroke="#F59E0B" stroke-width="1.2" opacity="0.35"/>
    <line x1="-30" y1="52" x2="35" y2="17" stroke="#F59E0B" stroke-width="1.2" opacity="0.25"/>

    <!-- === WINDOWS on left face (isometric parallelograms) === -->
    <!-- Row 1 -->
    <polygon points="-45,-4 -35,-10 -35,-3 -45,3" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>
    <polygon points="-30,-12 -20,-18 -20,-11 -30,-5" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>
    <!-- Row 2 -->
    <polygon points="-45,14 -35,8 -35,15 -45,21" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>
    <polygon points="-30,6 -20,0 -20,7 -30,13" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>
    <!-- Row 3 -->
    <polygon points="-45,32 -35,26 -35,33 -45,39" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>
    <polygon points="-30,24 -20,18 -20,25 -30,31" fill="none" stroke="#D97706" stroke-width="1.3" opacity="0.7"/>

  </g>
</svg>
